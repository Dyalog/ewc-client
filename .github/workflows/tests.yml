name: tests

on:
  # Run on every push to main/next AND on pull requests. Triggering
  # from `push` (not `workflow_run` chained off Build and Commit Dist)
  # is what makes tests show up as a status check on the commit and
  # in branch-protection rules — workflow_run-triggered runs are
  # invisible to the commit-status UI. Tradeoff: tests run in
  # parallel with the build instead of after it, but the e2e job
  # does its own `yarn build` so it doesn't depend on the build's
  # auto-committed dist anyway.
  #
  # Build and Commit Dist's auto-commit of dist/ does NOT re-trigger
  # this workflow: GitHub's GITHUB_TOKEN protection prevents pushes
  # made by GITHUB_TOKEN from spawning new workflow runs. The
  # `actor != github-actions[bot]` skip below is belt-and-suspenders
  # for the case where a future change uses a PAT instead.
  push:
    branches: [main, next]
    paths-ignore:
      - '**.md'
      - 'README'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'README'
      - 'docs/**'
  # Manual rerun: useful after merging a baselines PR (whose
  # GITHUB_TOKEN-authored merge doesn't fire downstream workflows),
  # for re-running flaky failures without an empty commit, or for
  # smoke-testing a branch against a non-default ewc-server ref.
  workflow_dispatch:
    inputs:
      ewc_server_ref:
        description: |
          Dyalog/ewc branch to build against. Leave blank for the
          default resolution (same-name branch on Dyalog/ewc, falling
          back to main). Same semantics as update-baselines.yml.
        required: false
        default: ''

# Opt JavaScript-based actions (checkout, setup-node, upload-artifact)
# into Node.js 24 ahead of GitHub's June 2026 forced migration. Silences
# the deprecation warnings now and makes the cutover a non-event.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Look for the [NOTEST] marker in any of: latest commit message, PR
  # title, PR body. A separate job because GitHub doesn't expose
  # commit messages in the `pull_request` event payload — we have to
  # `git log` after checkout to see them. The PR title/body come from
  # event payload fields (passed via env vars to avoid script-
  # injection risk from inlining ${{ }} into the shell).
  # Mirrors `[NOBUILD]` in build-and-commit.yml.
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.notest.outputs.skip }}
    steps:
      - name: Checkout for commit-message inspection
        uses: actions/checkout@v4
        with:
          # pull_request → PR's HEAD commit (not the merge commit, so
          #                                  git log -1 sees the PR's
          #                                  latest real commit).
          # push        → empty string falls through to default
          #                                  checkout = the pushed commit.
          ref: ${{ github.event.pull_request.head.sha || '' }}
      - name: Look for [NOTEST] in commit / PR title / PR body
        id: notest
        env:
          # PR_TITLE/PR_BODY are populated only on pull_request events;
          # empty strings on push. Always-defined here so the shell
          # doesn't fall over.
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Manual dispatch is explicit intent — never honour [NOTEST]
          # in that path, otherwise a stale commit-message marker would
          # silently no-op the manual rerun the user just clicked.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "::notice::Manual dispatch — ignoring any [NOTEST] markers."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MSG=$(git log -1 --pretty=%B)
          COMBINED="$MSG"$'\n'"$PR_TITLE"$'\n'"$PR_BODY"
          if echo "$COMBINED" | grep -q '\[NOTEST\]'; then
            echo "::notice::Found [NOTEST] in commit / PR title / PR body — skipping tests."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: check
    runs-on: ubuntu-latest
    # Sharded across N parallel jobs, each with its OWN fresh Dyalog/EWC
    # container. EWC is a single long-lived Dyalog session that degrades
    # after a few hundred tests' worth of events/WS reconnects (see the
    # reconnect-storm in the post-run Dyalog log), so holding each shard to
    # ~1/N of the suite keeps every session well under that ceiling.
    # fail-fast: false so one wedged shard doesn't cancel the others. The
    # per-shard blob reports are recombined by the `merge` job below.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    # Job cap is a backstop only. The Playwright STEP carries its own,
    # lower timeout (see below) so a hung shard is stopped gracefully
    # well before this fires — leaving headroom for cold-cache setup.
    timeout-minutes: 25
    # Skip if any of:
    #   - the check job found [NOTEST] in the latest commit / PR
    #   - the push was made by github-actions[bot] (Build and Commit
    #     Dist's auto-commit of dist/). GITHUB_TOKEN protection
    #     should already prevent that push from triggering us, but
    #     this is belt-and-suspenders if someone later swaps in a
    #     PAT. PRs and direct human pushes still run normally.
    if: |
      needs.check.outputs.skip != 'true' &&
      github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout ewc-client
        uses: actions/checkout@v4

      - name: Checkout Dyalog/ewc
        # Resolves the ewc-server ref in this order:
        #   1. workflow_dispatch ewc_server_ref input (manual override)
        #   2. EWC-REF: <branch> in the PR body (PR author override)
        #   3. same branch name as this workflow's branch
        #   4. main fallback
        # See .github/actions/checkout-ewc-server/action.yml for the
        # full precedence rules and rationale.
        uses: ./.github/actions/checkout-ewc-server
        with:
          # `inputs.ewc_server_ref` is empty on push/pull_request and
          # only populated on workflow_dispatch — empty falls through
          # to auto-detection inside the composite action.
          ref: ${{ inputs.ewc_server_ref || '' }}
          # head_ref is set on PR events (the source branch); ref_name
          # covers push and workflow_dispatch. We want the *source* on
          # PRs because github.ref_name on a PR is the merge ref
          # ("123/merge"), which never has a Dyalog/ewc counterpart.
          branch: ${{ github.head_ref || github.ref_name }}
          pr-body: ${{ github.event.pull_request.body || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache Playwright browsers
        # Hit → install step skips the ~170 MB Chromium download.
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Keep apt archives (so the deb cache below persists them)
        # Playwright's install-deps runs apt-get; by default the runner
        # purges downloaded .debs after install, which would leave the
        # archive cache empty. This keeps them on disk for caching.
        run: |
          echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' \
            | sudo tee /etc/apt/apt.conf.d/01keep-debs >/dev/null

      - name: Cache apt archives (Playwright system deps)
        # The slow/flaky part of `--with-deps` is the Azure Ubuntu mirror
        # FETCH (it once took >6 min and timed out), NOT the browser
        # binary (cached above). Caching the .debs means a hit installs
        # from local disk and skips the mirror entirely. Bump the -vN
        # suffix to force a refresh if the dependency set changes.
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-playwright-${{ runner.os }}-v1

      - name: Install Playwright system deps (apt)
        # apt only. Generous timeout + retry to ride out a slow mirror or
        # a transient `Ign` fetch — a failure here has no `if:` guard, so
        # it skips the ENTIRE suite (and starves the cache). install-deps
        # installs the same packages as --with-deps, keeping the font set
        # identical to the baselines.
        timeout-minutes: 12
        run: |
          for i in 1 2 3; do
            sudo apt-get update && npx playwright install-deps chromium && break
            echo "::warning::apt attempt $i failed; retrying in 15s"; sleep 15
          done

      - name: Install Playwright browser
        # Browser binary only — backed by the ms-playwright cache above,
        # so this is a fast no-op on a cache hit.
        timeout-minutes: 6
        run: npx playwright install chromium

      - name: Build ewc-client
        run: yarn build

      - name: Start Dyalog EWC server (Docker)
        run: |
          # Mirror the local invocation:
          #   pipe link.create + EWC.FOLDER + demo.Run into dyalog,
          #   then `sleep infinity` to keep stdin open so demo.Run's
          #   wait loop stays active and the EWC Timer keeps firing.
          # See ci/run-server.sh — it also sets up the env
          # vars (DYALOG, LD_LIBRARY_PATH, SESSION_FILE) that the
          # image's default /entrypoint normally provides.
          #
          # --network host (Linux runners only) lets Playwright reach
          # :22322 directly without port-mapping ceremony.
          docker run -d --name ewc-demo --network host \
            --entrypoint /scripts/run-server.sh \
            -v "${{ github.workspace }}/ewc-server:/work/ewc:ro" \
            -v "${{ github.workspace }}/dist:/work/ewc-client/dist:ro" \
            -v "${{ github.workspace }}/ci:/scripts:ro" \
            dyalog/dyalog:latest

      - name: Diagnostics — what's running before wait-on
        # Run unconditionally so we see the state before `wait-on` has
        # a chance to hang the job. If Dyalog didn't start (script
        # error, link.create failure, etc.) the cause is visible in
        # seconds instead of after a 2-min timeout.
        run: |
          sleep 5
          echo '=== Listening ports ==='
          (ss -tln 2>/dev/null || netstat -tln) | head -30 || true
          echo
          echo '=== Docker container status ==='
          docker ps -a --filter name=ewc-demo || true
          echo
          echo '=== Dyalog container logs ==='
          docker logs ewc-demo 2>&1 | tail -80 || true

      - name: Wait for EWC server
        # EWC's WSS serves both the React client (HTTP at /) and the
        # WebSocket on the same port. We deliberately don't run Vite
        # preview — in production mode the bundled JS uses
        # window.location.origin to derive the WS URL, so loading
        # localhost:5173 would have it dial ws://localhost:5173/ and
        # silently fail. Loading localhost:22322 makes the WS upgrade
        # land on EWC, same origin.
        #
        # Probe via tcp: only — `wait-on http://…` defaults to HEAD
        # requests, and EWC's WSS only handles GET (it logs
        # "Unhandled HTTP method: HEAD" and never responds). TCP-
        # listening proof is sufficient; Playwright issues a real
        # GET when it loads the page.
        run: npx wait-on tcp:22322 --timeout 120000

      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        # Step-level timeout, deliberately LOWER than the job cap, so a
        # wedged shard is SIGINT-stopped (Playwright flushes its blob) and
        # the post-run steps still run under `if: always()`, rather than the
        # job-level SIGKILL that left artifacts empty.
        #
        # --shard splits at the spec-FILE boundary (fullyParallel: false),
        # so whole describes stay on one backend. --reporter=blob,list
        # overrides the config: `blob` is the mergeable per-shard artifact
        # (recombined by the `merge` job), `list` streams named results into
        # this shard's log so a failure or wedge is legible live.
        #
        # Native runner Playwright (not MS's Docker image, whose
        # headless-shell mishandles Alt+Arrow / character-search in the
        # combo specs). maxDiffPixels: 100 (playwright.config.ts) stays
        # tight because baselines are generated on this same runner.
        timeout-minutes: 15
        env:
          BROWSER_URL: http://localhost:22322
        run: npx playwright test --shard=${{ matrix.shard }}/${{ strategy.job-total }} --reporter=blob,list

      - name: Capture Dyalog container logs (post-run)
        if: always()
        run: docker logs ewc-demo || true

      - name: Upload blob report (shard ${{ matrix.shard }})
        # always() so a wedged/failed shard still uploads its (possibly
        # partial) blob — the merge job tolerates partials. The merged,
        # browsable html report is produced once by the `merge` job.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          if-no-files-found: ignore
          retention-days: 7

  # Recombine the per-shard blob reports into ONE browsable html report
  # with aggregate pass/fail. Runs even when shards fail (visual diffs, a
  # wedged shard) via !cancelled(); skipped only if the whole e2e matrix
  # was skipped (e.g. [NOTEST]). Needs no browsers or EWC backend — just
  # @playwright/test for `merge-reports`.
  merge:
    needs: e2e
    if: ${{ !cancelled() && needs.e2e.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ewc-client
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download all shard blob reports
        # merge-multiple flattens every blob-report-N artifact into one
        # directory (report-1.zip … report-N.zip) for merge-reports.
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge into one HTML report
        # html → the single browsable artifact; github → aggregated inline
        # annotations. CI=true keeps the html reporter from opening a
        # browser. Tolerates a partial blob from a wedged shard.
        run: npx playwright merge-reports --reporter html,github ./all-blob-reports

      - name: Upload merged Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
